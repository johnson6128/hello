<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TODO管理</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }
    .container { width: 100%; max-width: 560px; }
    h1 { font-size: 1.8rem; color: #1a1a2e; margin-bottom: 24px; text-align: center; }
    .add-form { display: flex; gap: 8px; margin-bottom: 24px; }
    .add-form input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color .2s;
    }
    .add-form input:focus { border-color: #4f8ef7; }
    .add-form button {
      padding: 10px 18px;
      background: #4f8ef7;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background .2s;
    }
    .add-form button:hover { background: #3a78e0; }
    .filters { display: flex; gap: 8px; margin-bottom: 16px; }
    .filters button {
      flex: 1;
      padding: 6px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all .15s;
    }
    .filters button.active { background: #4f8ef7; color: #fff; border-color: #4f8ef7; }
    .todo-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #fff;
      border-radius: 10px;
      padding: 12px 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      transition: opacity .2s;
    }
    .todo-item.done { opacity: .55; }
    .todo-item input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: #4f8ef7; }
    .todo-title { flex: 1; font-size: 1rem; color: #333; word-break: break-word; }
    .todo-item.done .todo-title { text-decoration: line-through; color: #999; }
    .delete-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 0 4px;
      transition: color .2s;
    }
    .delete-btn:hover { color: #e55; }
    .empty { text-align: center; color: #aaa; padding: 32px 0; font-size: 0.95rem; }
    .summary { text-align: right; font-size: 0.8rem; color: #999; margin-bottom: 8px; }
    .clear-btn {
      display: block;
      margin: 16px auto 0;
      padding: 6px 16px;
      background: none;
      border: 1px solid #ddd;
      border-radius: 6px;
      color: #999;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all .15s;
    }
    .clear-btn:hover { border-color: #e55; color: #e55; }
  </style>
</head>
<body>
  <div class="container">
    <h1>TODO 管理</h1>
    <form class="add-form" id="addForm">
      <input type="text" id="newTitle" placeholder="新しいタスクを入力..." maxlength="200" required />
      <button type="submit">追加</button>
    </form>
    <div class="filters">
      <button class="active" data-filter="all">すべて</button>
      <button data-filter="active">未完了</button>
      <button data-filter="done">完了済み</button>
    </div>
    <div class="summary" id="summary"></div>
    <ul class="todo-list" id="todoList"></ul>
    <p class="empty" id="emptyMsg" style="display:none">タスクがありません</p>
    <button class="clear-btn" id="clearDone">完了済みをクリア</button>
  </div>

  <script>
    const STORAGE_KEY = 'todos_v1';
    let todos = [];
    let filter = 'all';

    function load() {
      try { todos = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch { todos = []; }
    }

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
    }

    function nextId() {
      return todos.length ? Math.max(...todos.map(t => t.id)) + 1 : 1;
    }

    function addTodo(title) {
      todos.unshift({ id: nextId(), title, done: false, createdAt: Date.now() });
      save();
      render();
    }

    function toggleTodo(id) {
      todos = todos.map(t => t.id === id ? { ...t, done: !t.done } : t);
      save();
      render();
    }

    function deleteTodo(id) {
      todos = todos.filter(t => t.id !== id);
      save();
      render();
    }

    function clearDone() {
      todos = todos.filter(t => !t.done);
      save();
      render();
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function render() {
      const list = document.getElementById('todoList');
      const empty = document.getElementById('emptyMsg');
      const summary = document.getElementById('summary');

      const visible = todos.filter(t => {
        if (filter === 'active') return !t.done;
        if (filter === 'done') return t.done;
        return true;
      });

      const doneCount = todos.filter(t => t.done).length;
      summary.textContent = `${doneCount} / ${todos.length} 件完了`;

      list.innerHTML = '';
      empty.style.display = visible.length === 0 ? 'block' : 'none';

      visible.forEach(todo => {
        const li = document.createElement('li');
        li.className = 'todo-item' + (todo.done ? ' done' : '');
        li.innerHTML = `
          <input type="checkbox" ${todo.done ? 'checked' : ''} />
          <span class="todo-title">${escapeHtml(todo.title)}</span>
          <button class="delete-btn" title="削除">×</button>
        `;
        li.querySelector('input').addEventListener('change', () => toggleTodo(todo.id));
        li.querySelector('.delete-btn').addEventListener('click', () => deleteTodo(todo.id));
        list.appendChild(li);
      });
    }

    document.getElementById('addForm').addEventListener('submit', e => {
      e.preventDefault();
      const input = document.getElementById('newTitle');
      const title = input.value.trim();
      if (title) { addTodo(title); input.value = ''; }
    });

    document.querySelector('.filters').addEventListener('click', e => {
      const btn = e.target.closest('button[data-filter]');
      if (!btn) return;
      filter = btn.dataset.filter;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    });

    document.getElementById('clearDone').addEventListener('click', clearDone);

    load();
    render();
  </script>
</body>
</html>
